<!DOCTYPE html>

<head>
	<meta charset="utf-8">

	<title>Foo</title>
	<script type="module" src="src/a-bind.js"></script>
</head>
<body>
<h1>DOM Elements</h1>

<a-bind
	pull
	model="#model"
	property="value">
	<output>...</output>
</a-bind>

<label>
	Model:
	<input
		id="model"
		value="foo">
</label>

<label>
	Elem:
	<a-bind
		model="#model"
		property="value">
		<input>
	</a-bind>
</label>

	<form onsubmit="return false">
		<a-bind
			push
			model="#input"
			property="value"
			event="click">
			<button value="button value">Click Me</button>
		</a-bind>

		<a-bind
			model="#output"
			property="value">
			<input id="#input" value="input value">
		</a-bind>

		<a-bind
			pull
			model="#input"
			property="value">
			<output id="output">output value</output>
		</a-bind>

		<input type="reset">
	</form>

<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>FOO</title>
	<script type="module" src="src/index.js"></script>

	<script type="module">
		import loader from './src/loader.js';

		const app = {
			text: 'initial text',
			progress: 42,
			selected: 'two',
			selectedMulti: ['one', 'three'],

			selectOptions: [
				{label: 'Option One', value: 'one'},
				{label: 'Option Two', value: 'two'},
				{label: 'Option Three', value: 'three'}
			],

			sections: [
				{
					title: 'Section One',
					label: 'Text Input',
					inputId: 'input-text',
					inputType: 'text',
					inputProp: 'text',
					template: '#tmpl-input',
				},
				{
					title: 'Section Two',
					label: 'Progress Input',
					inputId: 'elem-progress',
					inputProp: 'progress',
					template: '#tmpl-progress',
				},
				{
					title: 'Section Three',
					label: 'Select Input',
					inputId: 'input-select',
					inputProp: 'selected',
					template: '#tmpl-select',
				}
			]
		}

		loader.define('app', app);
	</script>

</head>
<body>

<h1>Foo</h1>

<div id="container"></div>

<a-repeat target="#container" model="app" prop="sections">
	<template id="tmpl-input">
		<section>
			<h3>{{title}}</h3>
			<label for="{{inputId}}">{{label}}</label><br>
			<input type="{{inputType}}" id="{{inputId}}">
		</section>
	</template>

	<template id="tmpl-progress">
		<section>
			<h3>{{title}}</h3>
			<label for="{{inputId}}">{{label}}</label><br>
			<progress id="{{inputId}}" max="100"></progress>
		</section>
	</template>

	<template id="tmpl-select">
		<section>
			<h3>{{title}}</h3>
			<label for="{{inputId}}">{{label}}</label><br>

			<select id="{{inputId}}"></select>

      <a-repeat scope="app" prop="selectOptions" target="#{{inputId}}">

        <template>
          <option value="{{value}}">{{label}}</option>
        </template>
      </a-repeat>
		</section>
	</template>
</a-repeat>

</body>
</html>

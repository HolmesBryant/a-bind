<!-- file: tab-object.html -->
<a-bindgroup model="mod:testObject">
  <a-repeat prop="sections">

    <template id="tmpl-section">
      <section class="flex column stretch">
        <div class="flex stretch">

          <div class="flex column flex1 card center">
            <label for="{{inputId}}-output">
              Property: <i>{{prop}}</i>
            </label>

            <div class="flex center">
              <a-bind pull prop="{{prop}}">
                <output for="{{inputId}}"></output>
              </a-bind>

              <a-bind push prop={{prop}} event="click">
                <button value="{{newval}}">
                  Set to "{{newval}}"
                </button>
              </a-bind>
            </div><!-- /output -->
          </div><!-- /card -->

          <a-repeat prop="control">
            <template id="tmpl-basic">
              <div class="flex column flex1 card center">
                <label for="{{inputId}}">
                  {{label}}
                </label>

                <a-bind
                  prop="{{prop}}">
                  <input id="{{inputId}}" type="{{inputType}}" value="{{inputValue}}">
                </a-bind>
              </div><!-- /card -->
            </template>

            <template id="tmpl-color">
              <div class="flex column flex1 card center">
                <a-bind prop="{{prop}}" elem-prop="style.background">
                  <label for="{{inputId}}">
                    {{label}}
                  </label>
                </a-bind>

                <a-bind
                  prop="{{prop}}">
                  <input id="{{inputId}}" type="{{inputType}}" value="{{inputValue}}">
                </a-bind>
              </div><!-- /card -->
            </template>

            <template id="tmpl-checkbox">
              <div class="flex column flex1 card center">
                <label for="{{inputId}}">
                  {{label}}
                </label>

                <a-bind
                  prop="{{prop}}"
                  elem-prop="{{elemProp}}">
                  <input
                    id="{{inputId}}"
                    type="{{inputType}}">
                </a-bind>
              </div><!-- /card -->
            </template>

            <template id="tmpl-input-arr">
              <fieldset class="flex column flex1 card">
                <legend>{{label}}</legend>

                <div>
                  <label class="flex row-reverse">
                      value="foo"

                    <a-bind prop="{{prop}}">
                      <input
                        id="input-arr-foo{{idx}}"
                        type="{{inputType}}"
                        name="input-arr-{{idx}}"
                        value="foo">
                    </a-bind>
                  </label>

                  <label class="flex row-reverse">
                      value="bar"

                    <a-bind prop="{{prop}}">
                      <input
                        id="input-arr-bar{{idx}}"
                        name="input-arr-{{idx}}"
                        type="{{inputType}}"
                        value="bar">
                    </a-bind>
                  </label>

                  <label class="flex row-reverse">
                      value="baz"

                    <a-bind prop="{{prop}}">
                      <input
                        id="input-arr-baz{{idx}}"
                        name="input-arr-{{idx}}"
                        type="{{inputType}}"
                        value="baz">
                    </a-bind>
                  </label>
                </div><!-- /input -->
              </fieldset>
            </template>

            <template id="tmpl-select">
              <div class="flex column flex1 card center">
                <label for="{{inputId}}">
                  {{label}}
                </label>

                <a-bind prop="{{prop}}">
                  <select id="{{inputId}}"></select>
                </a-bind>

                <a-repeat
                  target="#{{inputId}}"
                  prop="{{options}}"
                  scope="mod:testObject">

                  <template>
                    <option value="{{value}}">{{label}}</option>
                  </template>
                </a-repeat>
              </div><!-- /card -->
            </template><!-- tmpl-select -->

            <template id="tmpl-select-multi">
              <div class="flex column flex1 card center">
                <label for="{{inputId}}">
                  {{label}}
                </label>

                <a-bind
                  prop="{{prop}}">
                  <select multiple id="{{inputId}}"></select>
                </a-bind>

                <a-repeat
                  target="#{{inputId}}"
                  prop="{{options}}"
                  scope="mod:testObject">

                  <template>
                    <option value="{{value}}">{{label}}</option>
                  </template>
                </a-repeat>
              </div><!-- /card -->
            </template><!-- tmpl-select-multi -->

            <template id="tmpl-button">
              <div class="flex column flex1 card center">
                <label for={{inputId}}>
                  {{label}}
                </label>

                <a-bind
                  prop="button"
                  elem-prop="{{elemProp}}"
                  event="click"
                  func="notify">
                  <button value={{inputValue}}>
                    Click Me!
                  </button>
                </a-bind>
              </div><!-- /card -->
            </template>

            <template id="tmpl-progress">
              <div class="flex column flex1 card center">
                <label for="{{inputId}}">
                  {{label}}
                </label>

                <a-bind
                  prop="{{prop}}">
                  <progress id="{{inputId}}" value="{{inputValue}}" max="100">foo</progress>
                </a-bind>
              </div><!-- /card -->
            </template>

            <template id="tmpl-file">
              <div class="flex column flex1 card center">
                <label for="{{inputId}}">
                  {{label}}
                </label>

                <a-bind
                  push
                  event="change"
                  func="fileInfo">
                  <input id="{{inputId}}" type="{{inputType}}" multiple>
                </a-bind>
              </div><!-- /card -->
            </template>
          </a-repeat>

        </div><!-- row -->

        <details>
          <summary id="{{inputId}}-details" class="nofrills">code</summary>
          <div class="flex stretch">
            <div class="flex1 card">
              <a-code highlight>
                <textarea>
                  {{outputCode}}
                </textarea>
              </a-code>
            </div><!-- card -->

            <div class="flex1 card">
              <a-code highlight>
                <textarea>
                  {{inputCode}}
                </textarea>
              </a-code>
            </div><!-- card -->
          </div><!-- row -->
        </details>
      </section>
      <hr>
    </template>
  </a-repeat>
</a-bindgroup>
